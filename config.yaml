simulation:
  iterations: 1000
  seed: 42
  fast_mode: false
  fast_mode_iterations: 1000
ensemble:
  weights:
    elo: 0.50
    fifa: 0.10
    market: 0.20
    polymarket: 0.20
  global_mean_rating: 1500.0
  provisional_shrinkage: 0.3
  provisional_cap_threshold: 30
elo_computation:
  k_factors:
    world_cup_final: 60
    continental_championship: 50
    world_cup_qualifier: 40
    other_official: 30
    friendly: 20
  home_advantage_elo: 100.0
  starting_rating: 1500.0
  historical_url: https://raw.githubusercontent.com/martj42/international_results/master/results.csv
host:
  teams:
  - United States
  - Canada
  - Mexico
  elo_bump: 75.0
  group_stage_only: true
home_advantage:
  elo_points: 65.0
goals_model:
  intercept: 0.18805260559433645
  slope: 0.0018876860720877838
  lambda_cap: 6.0
  lambda_floor: 0.1
dixon_coles:
  rho: -0.060918682601896486
  time_decay_halflife_days: 365
  xi: null
bivariate_poisson:
  enabled: false
knockout:
  caution_factor: 0.85
  extra_time_duration_fraction: 0.333
  penalty_base: 0.5
  penalty_strength_tilt: 0.05
  penalty_strength_tilt_max: 0.1
tiebreaker:
  yellow_card_weight: 1
  red_card_weight: 3
  second_yellow_weight: 3
best_third:
  criteria:
  - points
  - goal_difference
  - goals_scored
  - fair_play
  slots: 8
data:
  cache_dir: data/raw
  processed_dir: data/processed
  cache_ttl_hours: 24
  request_timeout_seconds: 15
  retry_max_attempts: 4
  retry_backoff_base_seconds: 2
  elo:
    enabled: true
    url: https://www.eloratings.net/World.tsv
    local_csv: data/raw/elo_ratings.csv
    filename: elo_ratings.csv
  fifa:
    enabled: true
    url: https://www.fifa.com/en/ranking/men?dateId=id14317
    filename: fifa_rankings.json
  market:
    enabled: true
    url: https://api.the-odds-api.com/v4/sports/soccer_world_cup_winner/odds/
    api_key_env: ODDS_API_KEY
    filename: market_odds.json
  polymarket:
    enabled: true
    filename: polymarket_odds.json
  historical:
    filename: historical_results.csv
    earliest_date: '2000-01-01'
validation:
  expected_teams: 48
  expected_groups: 12
  teams_per_group: 4
  expected_advancing_per_group: 2
  expected_best_third_slots: 8
  expected_r32_teams: 32
backtest:
  tournaments:
  - year: 2018
    historical_cutoff: '2018-06-14'
  - year: 2022
    historical_cutoff: '2022-11-20'
  calibration_min_bin_size: 10
  calibration_bins: 10
convergence:
  iteration_checkpoints:
  - 1000
  - 5000
  - 25000
  - 100000
  tracked_teams:
  - Brazil
  - France
  - England
  - Argentina
  - Germany
  - United States
sensitivity:
  parameters:
    ensemble_elo_weight:
      base: 0.6
      delta: 0.15
    host_elo_bump:
      base: 75.0
      delta: 37.5
    home_advantage:
      base: 65.0
      delta: 32.5
    knockout_caution_factor:
      base: 0.85
      delta: 0.1
  iterations: 10000
output:
  results_dir: results
  simulation_summary: results/simulation_summary.json
  run_manifest: results/run_manifest.json
  match_predictions: results/match_predictions.json
  convergence_plot: results/convergence.png
  sensitivity_plot: results/sensitivity_tornado.png
  calibration_plot: results/calibration.png
